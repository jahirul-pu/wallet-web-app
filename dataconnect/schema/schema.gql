type User @table {
  displayName: String!
  createdAt: Timestamp!
  email: String
  photoUrl: String
  currencyPreference: String
}

type Account @table {
  user: User!
  name: String!
  type: String!
  initialBalance: Float!
  createdAt: Timestamp!
  description: String
}

type Category @table {
  user: User!
  name: String!
  type: String!
  createdAt: Timestamp!
  description: String
  icon: String
}

type Transaction @table {
  user: User!
  account: Account!
  category: Category
  amount: Float!
  date: Date!
  type: String!
  description: String!
  createdAt: Timestamp!
  isRecurring: Boolean
  notes: String
}

type Budget @table {
  user: User!
  category: Category!
  amount: Float!
  period: String!
  startDate: Date!
  createdAt: Timestamp!
  endDate: Date
}